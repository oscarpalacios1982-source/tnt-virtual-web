<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNT Virtual España | VTC Euro Truck Simulator 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            color: #e2e8f0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%);
            border-radius: 24px;
            padding: 20px 32px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 12px;
            color: #94a3b8;
        }

        .stats {
            display: flex;
            gap: 32px;
        }

        .stat-card {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #fbbf24;
        }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
        }

        /* Grid principal */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        /* Cards */
        .card {
            background: #111827;
            border-radius: 20px;
            border: 1px solid #1f2937;
            overflow: hidden;
            transition: all 0.2s;
        }

        .card-header {
            padding: 20px 24px 12px 24px;
            border-bottom: 1px solid #1f2937;
            font-weight: 600;
            font-size: 18px;
            color: #f1f5f9;
        }

        .card-content {
            padding: 20px 24px;
        }

        /* Rutas */
        .route-card {
            background: #0f172a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #334155;
        }

        .route-title {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 14px;
            color: #94a3b8;
        }

        .route-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .route-value {
            font-weight: 500;
            color: #fbbf24;
        }

        .copy-btn {
            background: #f59e0b;
            color: #0f172a;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            margin-top: 12px;
            width: 100%;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #d97706;
        }

        .progress-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #1f2937;
        }

        .progress-bar {
            background: #1f2937;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            width: 58%;
            height: 100%;
            border-radius: 10px;
        }

        .weather {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
        }

        .badge {
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #94a3b8;
        }

        .generator-btn {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            color: #0f172a;
            font-weight: 700;
            padding: 14px;
            border-radius: 12px;
            border: none;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .city-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 16px 0;
        }

        .city-tag {
            background: #1e293b;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1f2937;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #22c55e;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <h1>TNT VIRTUAL ESPAÑA</h1>
                <p>Virtual Trucking Company | ETS2</p>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value">€1.25M</div>
                    <div class="stat-label">BANCO VTC</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">24</div>
                    <div class="stat-label">VIAJES</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">15</div>
                    <div class="stat-label">CONDUCTORES</div>
                </div>
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div class="dashboard-grid">
            <!-- Columna Izquierda -->
            <div>
                <!-- Generador -->
                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-header">🚚 GENERAR RUTA AUTOMÁTICA</div>
                    <div class="card-content">
                        <button class="generator-btn" id="generarRutaBtn">🎲 GENERAR NUEVA RUTA</button>
                        <div id="rutaGenerada"></div>
                    </div>
                </div>

                <!-- Rutas Actuales -->
                <div class="card">
                    <div class="card-header">📋 RUTAS DISPONIBLES</div>
                    <div class="card-content" id="rutasContainer"></div>
                </div>
            </div>

            <!-- Columna Derecha -->
            <div>
                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-header">📍 ESTADO DEL VIAJE</div>
                    <div class="card-content">
                        <div class="progress-section">
                            <div style="display: flex; justify-content: space-between;">
                                <span>Progreso ruta actual</span>
                                <span id="progresoPorcentaje">58%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="barraProgreso" style="width: 58%;"></div>
                            </div>
                            <div class="weather">
                                <span>🕒 ETA: <strong id="eta">1h 45m</strong></span>
                                <span>🌡️ Lyon: <strong id="temperatura">12°C</strong></span>
                                <span>💨 Viento: <strong id="viento">18 km/h</strong></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">🏆 LOGROS VTC</div>
                    <div class="card-content">
                        <div class="city-list">
                            <span class="badge">⭐ 1.000 KM</span>
                            <span class="badge">🏅 MASTER</span>
                            <span class="badge">🗺️ 5 DLCs</span>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 24px;">
                    <div class="card-header">📜 HISTORIAL DE RUTAS</div>
                    <div class="card-content" id="historialContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --------------------------------------------------------------
        // DATOS DE EMPRESAS Y MERCANCÍAS (basado en el CSV real)
        // --------------------------------------------------------------
        const empresas = {
            "rt_log": {
                nombre: "RT Log",
                ciudad: "Barcelona",
                pais: "España",
                tipo: "logística",
                cargas: ["furniture", "electronics", "medical_supplies", "car_parts", "frozen_food", "clothes", "toys", "paper"]
            },
            "tradeaux": {
                nombre: "Tradeaux",
                ciudad: "Lyon",
                pais: "Francia",
                tipo: "distribución",
                cargas: ["furniture", "electronics", "clothes", "frozen_food", "wine", "cheese", "car_parts", "toys"]
            },
            "eurogoodies": {
                nombre: "EuroGoodies",
                ciudad: "París",
                pais: "Francia",
                tipo: "alimentación",
                cargas: ["frozen_food", "cheese", "wine", "chocolate", "coffee", "fruit", "vegetables"]
            },
            "lkwlog": {
                nombre: "LKW Log",
                ciudad: "Berlín",
                pais: "Alemania",
                tipo: "logística pesada",
                cargas: ["machinery", "car_parts", "electronics", "furniture", "steel_pipes", "concrete"]
            },
            "transinet": {
                nombre: "Transinet",
                ciudad: "Madrid",
                pais: "España",
                tipo: "transporte general",
                cargas: ["furniture", "electronics", "clothes", "toys", "paper", "medical_supplies"]
            },
            "stokes": {
                nombre: "Stokes",
                ciudad: "Londres",
                pais: "Reino Unido",
                tipo: "logística",
                cargas: ["electronics", "clothes", "furniture", "car_parts", "pharmaceuticals"]
            }
        };

        // Distancias entre ciudades
        const distancias = {
            "Barcelona-Lyon": 645,
            "Lyon-Barcelona": 641,
            "Barcelona-París": 1035,
            "París-Barcelona": 1030,
            "Barcelona-Madrid": 625,
            "Madrid-Barcelona": 618,
            "Barcelona-Berlín": 1850,
            "Berlín-Barcelona": 1845,
            "Lyon-París": 465,
            "París-Lyon": 460,
            "Madrid-Lyon": 1060,
            "Lyon-Madrid": 1055,
            "Londres-Barcelona": 1490,
            "Barcelona-Londres": 1485
        };

        // Historial guardado en localStorage
        let historial = JSON.parse(localStorage.getItem('tnt_historial')) || [];
        let rutaActual = null;

        // Función para obtener una carga común entre dos empresas
        function obtenerCargaComun(origen, destino) {
            const empresaOrigen = empresas[origen];
            const empresaDestino = empresas[destino];
            
            if (!empresaOrigen || !empresaDestino) return "goods";
            
            const cargasComunes = empresaOrigen.cargas.filter(carga => 
                empresaDestino.cargas.includes(carga)
            );
            
            if (cargasComunes.length === 0) return "general_goods";
            
            const randomIndex = Math.floor(Math.random() * cargasComunes.length);
            return cargasComunes[randomIndex];
        }

        // Formatear nombre de carga para mostrar
        function formatearCarga(carga) {
            const nombres = {
                "furniture": "Muebles",
                "electronics": "Electrónica",
                "medical_supplies": "Material médico",
                "car_parts": "Piezas de coche",
                "frozen_food": "Comida congelada",
                "clothes": "Ropa",
                "toys": "Juguetes",
                "paper": "Papel",
                "wine": "Vino",
                "cheese": "Queso",
                "chocolate": "Chocolate",
                "coffee": "Café",
                "fruit": "Fruta",
                "vegetables": "Verduras",
                "machinery": "Maquinaria",
                "steel_pipes": "Tubos de acero",
                "concrete": "Hormigón",
                "pharmaceuticals": "Farmacéuticos",
                "general_goods": "Mercancía general"
            };
            return nombres[carga] || carga.replace("_", " ").toUpperCase();
        }

        // Obtener peso aleatorio (12-24 toneladas)
        function obtenerPeso() {
            const pesos = {
                "furniture": [18000, 22000],
                "electronics": [8000, 15000],
                "frozen_food": [15000, 21000],
                "clothes": [6000, 12000],
                "wine": [18000, 24000],
                "cheese": [14000, 20000],
                "machinery": [16000, 25000],
                "car_parts": [12000, 20000],
                "concrete": [20000, 26000]
            };
            
            let min = 12000, max = 22000;
            for (let [key, range] of Object.entries(pesos)) {
                if (cargaActual && cargaActual.includes(key)) {
                    min = range[0];
                    max = range[1];
                    break;
                }
            }
            return Math.floor(Math.random() * (max - min) + min);
        }

        let cargaActual = "";

        // Generar ruta aleatoria
        function generarRutaAleatoria() {
            const empresasIds = Object.keys(empresas);
            const origenId = empresasIds[Math.floor(Math.random() * empresasIds.length)];
            let destinoId = empresasIds[Math.floor(Math.random() * empresasIds.length)];
            
            while (destinoId === origenId) {
                destinoId = empresasIds[Math.floor(Math.random() * empresasIds.length)];
            }
            
            const origen = empresas[origenId];
            const destino = empresas[destinoId];
            const carga = obtenerCargaComun(origenId, destinoId);
            cargaActual = carga;
            const peso = obtenerPeso();
            
            let distancia = distancias[`${origen.ciudad}-${destino.ciudad}`];
            if (!distancia) {
                distancia = Math.floor(Math.random() * (800 - 400 + 1) + 400);
            }
            
            return {
                origen: origen.ciudad,
                origenId: origenId,
                destino: destino.ciudad,
                destinoId: destinoId,
                carga: carga,
                cargaNombre: formatearCarga(carga),
                peso: peso,
                distancia: distancia
            };
        }

        // Renderizar rutas en el panel
        function renderizarRutas() {
            const ruta = generarRutaAleatoria();
            rutaActual = ruta;
            
            const container = document.getElementById('rutasContainer');
            container.innerHTML = `
                <div class="route-card">
                    <div class="route-title">📍 RUTA DE IDA</div>
                    <div class="route-detail">
                        <span>Origen:</span>
                        <span class="route-value">${ruta.origen} → ${ruta.destino}</span>
                    </div>
                    <div class="route-detail">
                        <span>Carga:</span>
                        <span class="route-value">${ruta.cargaNombre}</span>
                    </div>
                    <div class="route-detail">
                        <span>Peso:</span>
                        <span class="route-value">${(ruta.peso / 1000).toFixed(1)} toneladas</span>
                    </div>
                    <div class="route-detail">
                        <span>Distancia:</span>
                        <span class="route-value">${ruta.distancia} km</span>
                    </div>
                    <button class="copy-btn" onclick="copiarRuta('ida')">📋 COPIAR PARA VIRTUAL SPEDITOR</button>
                </div>
                <div class="route-card">
                    <div class="route-title">🔄 RUTA DE VUELTA</div>
                    <div class="route-detail">
                        <span>Origen:</span>
                        <span class="route-value">${ruta.destino} → ${ruta.origen}</span>
                    </div>
                    <div class="route-detail">
                        <span>Carga:</span>
                        <span class="route-value">${ruta.cargaNombre}</span>
                    </div>
                    <div class="route-detail">
                        <span>Peso:</span>
                        <span class="route-value">${(ruta.peso / 1000).toFixed(1)} toneladas</span>
                    </div>
                    <div class="route-detail">
                        <span>Distancia:</span>
                        <span class="route-value">${ruta.distancia} km</span>
                    </div>
                    <button class="copy-btn" onclick="copiarRuta('vuelta')">📋 COPIAR PARA VIRTUAL SPEDITOR</button>
                </div>
            `;
        }

        // Función para copiar formato Virtual Speditor
        window.copiarRuta = function(tipo) {
            if (!rutaActual) return;
            
            let texto = "";
            if (tipo === 'ida') {
                texto = `${rutaActual.origen} → ${rutaActual.destino} | ${rutaActual.cargaNombre} | ${(rutaActual.peso / 1000).toFixed(1)} t | ${rutaActual.distancia} km`;
            } else {
                texto = `${rutaActual.destino} → ${rutaActual.origen} | ${rutaActual.cargaNombre} | ${(rutaActual.peso / 1000).toFixed(1)} t | ${rutaActual.distancia} km`;
            }
            
            navigator.clipboard.writeText(texto);
            
            // Mostrar notificación
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = '✅ ¡Copiado a Virtual Speditor!';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        };

        // Generar ruta y guardar en historial
        function generarYGuardarRuta() {
            const ruta = generarRutaAleatoria();
            rutaActual = ruta;
            
            // Guardar en historial
            const nuevaEntrada = {
                fecha: new Date().toLocaleString(),
                origen: ruta.origen,
                destino: ruta.destino,
                carga: ruta.cargaNombre,
                distancia: ruta.distancia,
                peso: ruta.peso
            };
            historial.unshift(nuevaEntrada);
            if (historial.length > 10) historial.pop();
            localStorage.setItem('tnt_historial', JSON.stringify(historial));
            
            renderizarRutas();
            renderizarHistorial();
            actualizarProgreso();
        }

        // Renderizar historial
        function renderizarHistorial() {
            const container = document.getElementById('historialContainer');
            if (historial.length === 0) {
                container.innerHTML = '<div class="route-detail" style="text-align:center; color:#666;">Sin rutas completadas</div>';
                return;
            }
            
            container.innerHTML = historial.map(item => `
                <div class="history-item">
                    <div>
                        <div style="font-weight:500;">${item.origen} → ${item.destino}</div>
                        <div style="font-size:11px; color:#888;">${item.carga}</div>
                    </div>
                    <div style="text-align:right;">
                        <div>${item.distancia} km</div>
                        <div style="font-size:11px; color:#888;">${(item.peso/1000).toFixed(1)} t</div>
                    </div>
                </div>
            `).join('');
        }

        // Actualizar barra de progreso simulada
        function actualizarProgreso() {
            const progreso = Math.floor(Math.random() * (70 - 30 + 1) + 30);
            document.getElementById('progresoPorcentaje').textContent = `${progreso}%`;
            document.getElementById('barraProgreso').style.width = `${progreso}%`;
            
            const horas = Math.floor(Math.random() * (3 - 1 + 1) + 1);
            const minutos = Math.floor(Math.random() * 59);
            document.getElementById('eta').textContent = `${horas}h ${minutos}m`;
        }

        // Evento del botón generar
        document.getElementById('generarRutaBtn').addEventListener('click', () => {
            generarYGuardarRuta();
        });

        // Inicializar todo
        function init() {
            renderizarRutas();
            renderizarHistorial();
        }
        
        init();
    </script>
</body>
</html>
